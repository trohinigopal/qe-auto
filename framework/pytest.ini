[pytest]
addopts = -ra --strict-markers
testpaths =
    Netbanking/stepdefination
    MobileBanking/stepdefination
    API/stepdefination
    CrossChannel/stepdefination
markers =
    web: Web UI tests (selenium/playwright)
    mobile: Mobile app tests (appium)
    api: API tests (requests)
    cross: Cross channel tests
    smoke: Smoke suite
    regression: Regression suite
    generated: Generated from manual testcase converter
    self_heal: May persist healed locators to *_locators.json
